<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Water Tracker 🫐</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap');
  :root{--blue:#2e86ff;--teal:#00c2a8;--berry:#8a4fff;--lime:#5fd068;--dark:#1c2b46;--muted:#6a7a9c;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Quicksand',-apple-system,system-ui,sans-serif;color:var(--dark);min-height:100vh;padding:24px;display:flex;justify-content:center;
    background:linear-gradient(160deg,#caf0f8 0%,#b8e6ff 40%,#e0c3fc 100%);background-attachment:fixed;}
  .bubble{position:fixed;border-radius:50%;z-index:0;opacity:.35;}
  .b1{width:140px;height:140px;background:#7ee8fa;top:-30px;left:-30px;}
  .b2{width:180px;height:180px;background:#c4a7ff;bottom:-50px;right:-40px;}
  .wrap{position:relative;z-index:1;width:100%;max-width:480px;text-align:center;}
  .title{margin-bottom:22px;}
  h1{font-size:38px;font-weight:700;color:var(--blue);text-shadow:2px 2px 0 #fff;}
  .sub{color:var(--muted);font-size:16px;font-weight:600;margin-top:2px;}
  .card{background:rgba(255,255,255,.85);backdrop-filter:blur(8px);border-radius:28px;padding:28px 24px;margin-bottom:18px;box-shadow:0 14px 34px rgba(46,134,255,.2);}
  .ring{position:relative;width:210px;height:210px;margin:0 auto 22px;}
  .ring svg{transform:rotate(-90deg);}
  .ring .bg{stroke:#e4eefb;}
  .ring .fg{stroke:url(#grad);stroke-linecap:round;transition:stroke-dashoffset .6s cubic-bezier(.3,1.4,.5,1);}
  .ring .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ring .count{font-size:50px;font-weight:700;color:var(--blue);}
  .ring .goal{color:var(--muted);font-size:15px;font-weight:600;margin-top:2px;}
  .controls{display:flex;gap:12px;justify-content:center;}
  button{cursor:pointer;border:none;font-family:inherit;font-weight:700;transition:.2s;}
  .glass-btn{background:linear-gradient(135deg,var(--blue),var(--teal));color:#fff;font-size:18px;padding:16px 28px;border-radius:999px;box-shadow:0 10px 24px rgba(0,194,168,.45);}
  .glass-btn:hover{transform:translateY(-3px);}
  .minus{background:#eef4ff;color:var(--blue);font-size:20px;width:58px;border-radius:999px;}
  .minus:hover{background:#dde9ff;}
  .streak{display:flex;justify-content:space-around;margin-bottom:18px;}
  .stat .n{font-size:34px;font-weight:700;}
  .stat:first-child .n{color:#ff7849;}.stat:last-child .n{color:var(--berry);}
  .stat .l{color:var(--muted);font-size:13px;font-weight:600;margin-top:2px;}
  .week{display:flex;justify-content:space-between;gap:6px;}
  .day{flex:1;}
  .day .dot{width:100%;aspect-ratio:1;border-radius:14px;background:#eaf2fc;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:6px;}
  .day .dot.done{background:linear-gradient(135deg,var(--blue),var(--berry));box-shadow:0 4px 10px rgba(138,79,255,.35);}
  .day .dl{font-size:12px;color:var(--muted);font-weight:600;}
  .goal-set{display:flex;align-items:center;gap:10px;justify-content:center;color:var(--muted);font-size:15px;font-weight:600;}
  .goal-set input{width:64px;background:#eef4ff;border:2px solid #d6e4ff;border-radius:12px;padding:8px;color:var(--dark);text-align:center;font-size:16px;font-family:inherit;font-weight:700;outline:none;}
  .goal-set input:focus{border-color:var(--blue);}
</style>
</head>
<body>
  <div class="bubble b1"></div><div class="bubble b2"></div>
  <div class="wrap">
    <div class="title"><h1>Stay Hydrated 🫐</h1><p class="sub">Tap a glass each sip. Build that streak! 🌊</p></div>

    <div class="card">
      <div class="ring">
        <svg width="210" height="210" viewBox="0 0 210 210">
          <defs><linearGradient id="grad" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2e86ff"/><stop offset=".5" stop-color="#00c2a8"/><stop offset="1" stop-color="#5fd068"/></linearGradient></defs>
          <circle class="bg" cx="105" cy="105" r="90" fill="none" stroke-width="18"/>
          <circle class="fg" id="ring" cx="105" cy="105" r="90" fill="none" stroke-width="18" stroke-dasharray="565" stroke-dashoffset="565"/>
        </svg>
        <div class="center"><div class="count" id="count">0</div><div class="goal" id="goalText">of 8 glasses</div></div>
      </div>
      <div class="controls"><button class="minus" id="minus">－</button><button class="glass-btn" id="add">＋ Drink a glass 🥤</button></div>
    </div>

    <div class="card">
      <div class="streak">
        <div class="stat"><div class="n" id="streak">0</div><div class="l">🔥 Day streak</div></div>
        <div class="stat"><div class="n" id="best">0</div><div class="l">🏆 Best streak</div></div>
      </div>
      <div class="week" id="week"></div>
    </div>

    <div class="card"><div class="goal-set">Daily goal: <input type="number" id="goalInput" min="1" max="20"> glasses</div></div>
  </div>

  <script>
    const KEY='water_data';
    function today(){const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
    function load(){return JSON.parse(localStorage.getItem(KEY)||'null')||{goal:8,days:{},best:0};}
    let data=load();if(!data.days[today()])data.days[today()]=0;
    const C=2*Math.PI*90;const ringEl=document.getElementById('ring');ringEl.setAttribute('stroke-dasharray',C);
    function save(){localStorage.setItem(KEY,JSON.stringify(data));}
    function streakCount(){let s=0;const d=new Date();for(let i=0;i<400;i++){const k=d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();if((data.days[k]||0)>=data.goal)s++;else if(i>0)break;d.setDate(d.getDate()-1);}return s;}
    function render(){
      const t=today(),count=data.days[t]||0;
      document.getElementById('count').textContent=count;
      document.getElementById('goalText').textContent='of '+data.goal+' glasses';
      document.getElementById('goalInput').value=data.goal;
      const pct=Math.min(count/data.goal,1);ringEl.setAttribute('stroke-dashoffset',C*(1-pct));
      const st=streakCount();if(st>data.best){data.best=st;save();}
      document.getElementById('streak').textContent=st;document.getElementById('best').textContent=data.best;
      const weekEl=document.getElementById('week');weekEl.innerHTML='';
      const names=['S','M','T','W','T','F','S'];const d=new Date();d.setDate(d.getDate()-6);
      for(let i=0;i<7;i++){const k=d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();const done=(data.days[k]||0)>=data.goal;
        const day=document.createElement('div');day.className='day';
        day.innerHTML=`<div class="dot ${done?'done':''}">${done?'💧':''}</div><div class="dl">${names[d.getDay()]}</div>`;
        weekEl.appendChild(day);d.setDate(d.getDate()+1);}
    }
    document.getElementById('add').onclick=()=>{data.days[today()]=(data.days[today()]||0)+1;save();render();if(data.days[today()]===data.goal){document.querySelector('.ring').animate([{transform:'scale(1)'},{transform:'scale(1.1)'},{transform:'scale(1)'}],{duration:500});}};
    document.getElementById('minus').onclick=()=>{data.days[today()]=Math.max(0,(data.days[today()]||0)-1);save();render();};
    document.getElementById('goalInput').onchange=e=>{data.goal=Math.max(1,parseInt(e.target.value)||8);save();render();};
    render();
  </script>
</body>
</html>
